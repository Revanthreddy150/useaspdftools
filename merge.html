<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merge PDF - useas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f1f5f9; color: #0f172a; }
        
        .pdf-page-shadow {
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06), 0 0 0 1px rgba(0,0,0,0.05);
        }

        .page-reveal { animation: slideUp 0.5s ease-out forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* --- CUSTOM USEAS LOADING ANIMATION --- */
        .letter-loader {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100px;
            font-size: 3rem;
            font-weight: 900;
            color: #2563eb;
            letter-spacing: -2px;
        }

        .letter-loader span {
            position: absolute;
            opacity: 0;
            transform: scale(0.5);
            animation: letterSequence 4s infinite;
        }

        /* 5 letters (u, s, e, a, s) over 4 seconds */
        .letter-loader span:nth-child(1) { animation-delay: 0s; }
        .letter-loader span:nth-child(2) { animation-delay: 0.8s; }
        .letter-loader span:nth-child(3) { animation-delay: 1.6s; }
        .letter-loader span:nth-child(4) { animation-delay: 2.4s; }
        .letter-loader span:nth-child(5) { animation-delay: 3.2s; }

        @keyframes letterSequence {
            0% { opacity: 0; transform: translateY(10px) scale(0.8); }
            10% { opacity: 1; transform: translateY(0) scale(1.1); }
            20% { opacity: 0; transform: translateY(-10px) scale(0.8); }
            100% { opacity: 0; }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <nav class="bg-white/80 backdrop-blur-md border-b border-slate-200 h-16 flex items-center px-6 sticky top-0 z-50">
        <div class="flex items-center gap-3 cursor-pointer group" onclick="location.reload()">
            <div class="text-slate-400 group-hover:text-blue-600 transition-colors">
                <i data-lucide="arrow-left" class="w-6 h-6"></i>
            </div>
            <div class="flex items-center gap-2">
                <div class="bg-blue-600 p-1.5 rounded-lg shadow-sm">
                    <i data-lucide="layers" class="text-white w-4 h-4"></i>
                </div>
                <span class="text-xl font-extrabold tracking-tight">useas</span>
            </div>
        </div>
    </nav>

    <main class="flex-grow flex flex-col items-center">
        
        <div id="upload-view" class="w-full max-w-2xl px-6 py-24 text-center">
            <h1 class="text-4xl font-black mb-4 tracking-tight">Merge PDF</h1>
            <p class="text-slate-500 mb-10 text-lg font-medium">Combine your documents into one professional file.</p>
            
            <input type="file" id="pdf-input" class="hidden" multiple accept="application/pdf" onchange="startProcessing(event)">
            <label for="pdf-input" class="bg-white border-2 border-dashed border-slate-300 rounded-[2.5rem] p-16 md:p-24 hover:border-blue-500 transition-all cursor-pointer shadow-xl hover:shadow-2xl flex flex-col items-center group">
                <div class="bg-blue-600 text-white p-5 rounded-2xl mb-6 shadow-lg group-hover:scale-105 transition-transform">
                    <i data-lucide="plus" class="w-8 h-8"></i>
                </div>
                <span class="text-2xl font-bold">Select PDF files</span>
                <p class="text-slate-400 mt-2 font-medium uppercase text-[10px] tracking-widest">Local & Secure</p>
            </label>
        </div>

        <div id="loading-view" class="hidden py-40 flex flex-col items-center">
            <div class="letter-loader">
                <span>u</span>
                <span>s</span>
                <span>e</span>
                <span>a</span>
                <span>s</span>
            </div>
            <p class="font-bold text-slate-400 uppercase tracking-[0.2em] text-xs mt-4">Processing Document</p>
        </div>

        <div id="preview-view" class="hidden w-full flex flex-col items-center">
            <div class="w-full max-w-4xl p-6 md:p-10 space-y-10" id="pages-container"></div>
            <div class="h-32"></div>

            <div class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-xl border-t border-slate-200 p-5 z-50 shadow-[0_-10px_40px_-15px_rgba(0,0,0,0.1)]">
                <div class="max-w-4xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
                    <div class="flex items-center gap-3">
                        <div class="bg-green-100 text-green-600 p-2 rounded-full">
                            <i data-lucide="check-circle" class="w-5 h-5"></i>
                        </div>
                        <div>
                            <p class="text-sm font-bold text-slate-900 leading-tight">Ready for Download</p>
                            <p id="file-meta" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Merged HD Document</p>
                        </div>
                    </div>
                    
                    <a id="download-trigger" href="#" download="merged_useas.pdf" class="w-full md:w-auto bg-blue-600 hover:bg-blue-700 text-white px-12 py-4 rounded-2xl font-extrabold text-lg transition-all flex items-center justify-center gap-3 shadow-xl hover:-translate-y-1 active:scale-95">
                        Download Now <i data-lucide="download" class="w-5 h-5"></i>
                    </a>
                </div>
            </div>
        </div>

    </main>

    <script>
        const pdfjs = window['pdfjs-dist/build/pdf'];
        pdfjs.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        async function startProcessing(e) {
            const files = Array.from(e.target.files);
            if (files.length === 0) return;

            document.getElementById('upload-view').classList.add('hidden');
            document.getElementById('loading-view').classList.remove('hidden');

            try {
                const mergedDoc = await PDFLib.PDFDocument.create();
                for (const file of files) {
                    const bytes = await file.arrayBuffer();
                    const pdf = await PDFLib.PDFDocument.load(bytes);
                    const pages = await mergedDoc.copyPages(pdf, pdf.getPageIndices());
                    pages.forEach(p => mergedDoc.addPage(p));
                }

                const finalBytes = await mergedDoc.save();
                const blob = new Blob([finalBytes], { type: 'application/pdf' });
                const url = URL.createObjectURL(blob);

                // Update metadata (Size)
                const sizeMB = (blob.size / (1024 * 1024)).toFixed(2);
                document.getElementById('file-meta').innerText = `Merged HD Document • ${sizeMB} MB`;

                document.getElementById('download-trigger').href = url;
                await renderHD(finalBytes);

                // Give the loader a tiny bit of extra time so the user sees the cool animation
                setTimeout(() => {
                    document.getElementById('loading-view').classList.add('hidden');
                    document.getElementById('preview-view').classList.remove('hidden');
                    lucide.createIcons();
                }, 1500);

            } catch (err) {
                console.error(err);
                alert("An error occurred. Make sure PDFs are not protected.");
                location.reload();
            }
        }

        async function renderHD(data) {
            const pdf = await pdfjs.getDocument({ data }).promise;
            const container = document.getElementById('pages-container');
            container.innerHTML = '';

            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const viewport = page.getViewport({ scale: 1.5 });
                const pageWrapper = document.createElement('div');
                pageWrapper.className = "page-reveal flex flex-col items-center w-full";
                const canvas = document.createElement('canvas');
                canvas.className = "pdf-page-shadow bg-white w-full h-auto rounded-lg mb-4";
                const ctx = canvas.getContext('2d');
                canvas.height = viewport.height;
                canvas.width = viewport.width;
                await page.render({ canvasContext: ctx, viewport }).promise;
                const label = document.createElement('span');
                label.className = "text-[10px] font-black text-slate-400 uppercase tracking-widest mb-10";
                label.innerText = `PAGE ${i} OF ${pdf.numPages}`;
                pageWrapper.appendChild(canvas);
                pageWrapper.appendChild(label);
                container.appendChild(pageWrapper);
            }
        }

        lucide.createIcons();
    </script>
</body>
</html>
