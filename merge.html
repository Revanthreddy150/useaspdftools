<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merge PDF - useas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f1f5f9; color: #0f172a; }

        .pdf-page-shadow {
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .page-reveal { animation: slideUp 0.5s ease-out forwards; }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .letter-loader {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100px;
            font-size: 3rem;
            font-weight: 900;
            color: #2563eb;
        }

        .letter-loader span {
            position: absolute;
            opacity: 0;
            animation: letterSequence 4s infinite;
        }

        .letter-loader span:nth-child(1){animation-delay:0s;}
        .letter-loader span:nth-child(2){animation-delay:0.8s;}
        .letter-loader span:nth-child(3){animation-delay:1.6s;}
        .letter-loader span:nth-child(4){animation-delay:2.4s;}
        .letter-loader span:nth-child(5){animation-delay:3.2s;}

        @keyframes letterSequence {
            0%{opacity:0;}
            10%{opacity:1;}
            20%{opacity:0;}
        }
    </style>
</head>

<body class="min-h-screen flex flex-col">

<nav class="bg-white border-b h-16 flex items-center px-6">
    <div onclick="window.history.back()" class="cursor-pointer flex items-center gap-3">
        <i data-lucide="arrow-left"></i>
        <span class="font-bold">useas</span>
    </div>
</nav>

<main class="flex-grow flex flex-col items-center">

<div id="upload-view" class="text-center py-24">
    <h1 class="text-4xl font-bold mb-4">Merge PDF</h1>

    <input type="file" id="pdf-input" class="hidden" multiple accept="application/pdf" onchange="startProcessing(event)">
    
    <label for="pdf-input" class="border-2 border-dashed p-16 cursor-pointer block">
        Select PDF files
    </label>

    <!-- Chrome fallback button -->
    <button id="chrome-btn" onclick="openInChrome()" class="hidden mt-6 bg-red-500 text-white px-6 py-3 rounded-xl">
        Open in Chrome for Upload
    </button>
</div>

<div id="loading-view" class="hidden py-40 text-center">
    <div class="letter-loader">
        <span>u</span><span>s</span><span>e</span><span>a</span><span>s</span>
    </div>
</div>

<div id="preview-view" class="hidden w-full max-w-4xl">
    <div id="pages-container"></div>

    <a id="download-trigger" href="#" download="merged_useas.pdf"
       class="block bg-blue-600 text-white text-center py-4 mt-10">
       Download PDF
    </a>
</div>

</main>

<script>
const pdfjs = window['pdfjs-dist/build/pdf'];
pdfjs.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

// ✅ Detect WebView
function isWebView() {
    return /wv|Android.*Version|WebView/i.test(navigator.userAgent);
}

// ✅ Open Chrome
function openInChrome() {
    let url = window.location.href;
    window.location.href = "intent://" + url.replace(/^https?:\/\//, '') + "#Intent;scheme=https;package=com.android.chrome;end";
}

// ✅ Upload handler
function startProcessing(e) {
    const files = Array.from(e.target.files);

    if (!files || files.length === 0) {
        if (isWebView()) {
            alert("Upload not supported in app. Opening Chrome...");
            openInChrome();
        }
        return;
    }

    processPDF(files);
}

// ✅ PDF Merge
async function processPDF(files) {
    document.getElementById('upload-view').classList.add('hidden');
    document.getElementById('loading-view').classList.remove('hidden');

    try {
        const mergedDoc = await PDFLib.PDFDocument.create();

        for (const file of files) {
            const bytes = await file.arrayBuffer();
            const pdf = await PDFLib.PDFDocument.load(bytes);
            const pages = await mergedDoc.copyPages(pdf, pdf.getPageIndices());
            pages.forEach(p => mergedDoc.addPage(p));
        }

        const finalBytes = await mergedDoc.save();
        const blob = new Blob([finalBytes], { type: 'application/pdf' });
        const url = URL.createObjectURL(blob);

        document.getElementById('download-trigger').href = url;

        await renderPDF(finalBytes);

        document.getElementById('loading-view').classList.add('hidden');
        document.getElementById('preview-view').classList.remove('hidden');

    } catch (e) {
        alert("Error! Opening in Chrome...");
        openInChrome();
    }
}

// ✅ Render preview
async function renderPDF(data) {
    const pdf = await pdfjs.getDocument({ data }).promise;
    const container = document.getElementById('pages-container');

    for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const viewport = page.getViewport({ scale: 1 });

        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');

        canvas.height = viewport.height;
        canvas.width = viewport.width;

        await page.render({ canvasContext: ctx, viewport }).promise;
        container.appendChild(canvas);
    }
}

// ✅ Show Chrome button if WebView
window.onload = function() {
    if (isWebView()) {
        document.getElementById("chrome-btn").classList.remove("hidden");
    }
}

lucide.createIcons();
</script>

</body>
</html>
