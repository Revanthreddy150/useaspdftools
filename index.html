<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF Tools Hub</title>

<style>
body{
  font-family: Arial;
  margin:0;
  background:#f3f3f8;
  text-align:center;
}

.header{
  padding:20px;
  font-size:22px;
  font-weight:bold;
}

.container{
  padding:20px;
}

.card{
  background:white;
  padding:30px;
  border-radius:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

button{
  background:#5b5be0;
  color:white;
  border:none;
  padding:12px 20px;
  margin:10px;
  border-radius:8px;
  font-size:16px;
  cursor:pointer;
}

button:hover{
  opacity:0.8;
}

.back{
  text-align:left;
  margin-bottom:20px;
  cursor:pointer;
  color:#5b5be0;
  font-weight:bold;
}
.hidden{
  display:none;
}
</style>
</head>

<body>

<div class="header">PDF Tools Hub</div>

<div class="container">

<!-- DASHBOARD -->
<div id="dashboard" class="card">

<h2>Select Tool</h2>

<button onclick="openPage('compress')">Compress PDF</button>
<button onclick="openPage('merge')">Merge PDF</button>
<button onclick="openPage('rotate')">Rotate PDF</button>
<button onclick="openPage('split')">Split PDF</button>

</div>

<!-- COMPRESS -->
<div id="compress" class="card hidden">
<div class="back" onclick="goBack()">← Back to Dashboard</div>
<h2>Compress PDF</h2>
<input type="file"><br><br>
<button>Run Action</button>
</div>

<!-- MERGE -->
<div id="merge" class="card hidden">
<div class="back" onclick="goBack()">← Back to Dashboard</div>
<h2>Merge PDF</h2>
<input type="file" multiple><br><br>
<button>Run Action</button>
</div>

<!-- ROTATE -->
<div id="rotate" class="card hidden">
<div class="back" onclick="goBack()">← Back to Dashboard</div>
<h2>Rotate PDF</h2>
<input type="file"><br><br>
<button>Run Action</button>
</div>

<!-- SPLIT -->
<div id="split" class="card hidden">
<div class="back" onclick="goBack()">← Back to Dashboard</div>
<h2>Split PDF</h2>
<input type="file"><br><br>
<button>Run Action</button>
</div>

</div>

<script>
function openPage(page){
  document.getElementById("dashboard").classList.add("hidden");
  document.getElementById(page).classList.remove("hidden");
}

function goBack(){
  document.getElementById("dashboard").classList.remove("hidden");
  document.getElementById("compress").classList.add("hidden");
  document.getElementById("merge").classList.add("hidden");
  document.getElementById("rotate").classList.add("hidden");
  document.getElementById("split").classList.add("hidden");
}
</script>

</body>
</html>
