<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Tools Hub</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <style>
        :root {
            --bg-color: #fdfbff;
            --card-bg: #ffffff;
            --text-main: #33334d;
            --text-sub: #6b6b83;
            --primary: #6366f1;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            --border: 1.5px solid #eef0f5;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 24px;
            width: 100%;
            max-width: 1000px;
        }

        .card {
            background: var(--card-bg);
            border: var(--border);
            border-radius: 24px;
            padding: 24px;
            display: flex;
            align-items: flex-start;
            gap: 20px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: var(--shadow);
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
        }

        .icon-box {
            min-width: 54px;
            height: 54px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .bg-compress { background: #4ade80; }
        .bg-merge    { background: #6366f1; }
        .bg-rotate   { background: #f87171; }
        .bg-split    { background: #fbbf24; }

        /* Tool UI */
        #tool-section {
            display: none;
            width: 100%;
            max-width: 600px;
            background: white;
            padding: 30px;
            border-radius: 24px;
            box-shadow: var(--shadow);
            text-align: center;
        }

        .btn {
            background: var(--primary);
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 20px;
            font-weight: bold;
        }

        .back-btn {
            align-self: flex-start;
            margin-bottom: 20px;
            cursor: pointer;
            color: var(--primary);
            display: none;
        }
    </style>
</head>
<body>

    <div id="back-link" class="back-btn" onclick="showHome()">← Back to Dashboard</div>
    
    <h1 id="main-title">Manage Your PDF Documents</h1>

    <div class="container" id="dashboard">
        <div class="card" onclick="openTool('compress')">
            <div class="icon-box bg-compress"><i data-lucide="shrink"></i></div>
            <div class="content"><h3>Compress PDF</h3><p>Optimize file size.</p></div>
        </div>

        <div class="card" onclick="openTool('merge')">
            <div class="icon-box bg-merge"><i data-lucide="combine"></i></div>
            <div class="content"><h3>Merge PDF</h3><p>Combine multiple PDFs.</p></div>
        </div>

        <div class="card" onclick="openTool('rotate')">
            <div class="icon-box bg-rotate"><i data-lucide="rotate-cw"></i></div>
            <div class="content"><h3>Rotate PDF</h3><p>Flip pages 90 degrees.</p></div>
        </div>

        <div class="card" onclick="openTool('split')">
            <div class="icon-box bg-split"><i data-lucide="scissors"></i></div>
            <div class="content"><h3>Split PDF</h3><p>Extract page 1 as a new file.</p></div>
        </div>
    </div>

    <div id="tool-section">
        <h2 id="tool-name">Tool Name</h2>
        <input type="file" id="pdf-input" accept="application/pdf" multiple>
        <br>
        <button class="btn" onclick="processPDF()">Run Action</button>
        <p id="status"></p>
    </div>

    <script>
        lucide.createIcons();
        let currentTool = '';

        function openTool(tool) {
            currentTool = tool;
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('main-title').style.display = 'none';
            document.getElementById('tool-section').style.display = 'block';
            document.getElementById('back-link').style.display = 'block';
            document.getElementById('tool-name').innerText = tool.toUpperCase() + " PDF";
        }

        function showHome() {
            document.getElementById('dashboard').style.display = 'grid';
            document.getElementById('main-title').style.display = 'block';
            document.getElementById('tool-section').style.display = 'none';
            document.getElementById('back-link').style.display = 'none';
        }

        async function processPDF() {
            const files = document.getElementById('pdf-input').files;
            if (files.length === 0) return alert("Select a file first!");
            
            const { PDFDocument, degrees } = PDFLib;
            let finalPdf;

            if (currentTool === 'merge') {
                finalPdf = await PDFDocument.create();
                for (let f of files) {
                    const donorPdf = await PDFDocument.load(await f.arrayBuffer());
                    const pages = await finalPdf.copyPages(donorPdf, donorPdf.getPageIndices());
                    pages.forEach(p => finalPdf.addPage(p));
                }
            } else if (currentTool === 'rotate') {
                finalPdf = await PDFDocument.load(await files[0].arrayBuffer());
                const pages = finalPdf.getPages();
                pages.forEach(p => p.setRotation(degrees(90)));
            } else if (currentTool === 'split') {
                const source = await PDFDocument.load(await files[0].arrayBuffer());
                finalPdf = await PDFDocument.create();
                const [firstPage] = await finalPdf.copyPages(source, [0]);
                finalPdf.addPage(firstPage);
            } else {
                alert("Compression requires server-side logic, but Merge/Split/Rotate work here!");
                return;
            }

            const pdfBytes = await finalPdf.save();
            const blob = new Blob([pdfBytes], { type: "application/pdf" });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `result_${currentTool}.pdf`;
            link.click();
        }
    </script>
</body>
</html>
